databaseChangeLog:
  - changeSet:
      id: "6-fix-sequences"
      author: "Dapeng Li"
      changes:
        - sql:
            splitStatements: true
            sql: >
              SELECT setval('customer_id_seq', (SELECT MAX(id) FROM customer));
              SELECT setval('order_id_seq', (SELECT MAX(id) FROM "order"));
              SELECT setval('product_id_seq', (SELECT MAX(id) FROM product));
